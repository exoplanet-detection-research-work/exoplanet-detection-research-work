defaults:
  - base.yaml

experiment_name: fusion_classifier_v1
seed: 42

model:
  architecture:
    name: fusion
    params:
      global_bins: 2001
      local_bins: 401
      embed_dim: 128
      hidden_dim: 256
      cnn_channels: [32, 64, 128]
      cnn_kernel_sizes: [7, 5, 3]
      transformer_depth: 4
      transformer_heads: 4
      transformer_checkpoint: true
      fusion_strategy: cross_attention
      num_classes: 5
      trainer_output: binary_transit

training:
  trainer:
    name: supervised
    params:
      backend: torch
      use_views: both
      loss:
        name: bce
        params: {}
      optimizer:
        name: adamw
        params:
          weight_decay: 0.01
      scheduler:
        name: cosine
        params: {}
      amp: none
      grad_clip_norm: 1.0
      checkpoint:
        monitor: val_loss
        save_best: true
        save_last: true
        top_k: 3
      callbacks:
        - name: early_stopping
          params:
            patience: 20
        - name: checkpoint
          params: {}
      tracking:
        enabled: true
        backends: [csv]
  epochs: 100
  batch_size: 32
  learning_rate: 1.0e-3
  early_stopping_patience: 20

evaluation:
  metrics:
    - name: accuracy
      params: {}
    - name: roc_auc
      params: {}
    - name: f1
      params: {}
  decision_threshold: 0.5
