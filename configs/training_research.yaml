defaults:
  - base.yaml

experiment_name: fusion_research_v1
seed: 42

model:
  architecture:
    name: fusion
    params:
      global_bins: 2001
      local_bins: 401
      embed_dim: 64
      hidden_dim: 128
      cnn_channels: [16, 32]
      cnn_kernel_sizes: [5, 3]
      transformer_depth: 2
      transformer_heads: 2
      physics_hidden_dims: [32]
      num_classes: 5
      trainer_output: binary_transit

training:
  trainer:
    name: research
    params:
      backend: torch
      use_views: both
      loss:
        name: bce
        params: {}
      optimizer:
        name: adamw
        params:
          weight_decay: 0.01
      scheduler:
        name: cosine
        params: {}
      amp: none
      grad_clip_norm: 1.0
      checkpoint:
        monitor: val_loss
        save_best: true
        save_last: true
        top_k: 3
      callbacks:
        - name: early_stopping
          params:
            patience: 10
        - name: checkpoint
          params: {}
        - name: ema
          params:
            decay: 0.999
      tracking:
        enabled: true
        backends: [csv, tensorboard]
      research:
        enabled: true
        curriculum:
          enabled: true
          schedule: step
          stages:
            - name: high_snr
              min_snr: 12.0
              max_snr: 1000.0
              epochs: 0.25
            - name: medium_snr
              min_snr: 7.0
              max_snr: 12.0
              epochs: 0.25
            - name: low_snr
              min_snr: 4.0
              max_snr: 7.0
              epochs: 0.25
            - name: edge_cases
              min_snr: 0.0
              max_snr: 4.0
              epochs: 0.25
        imbalance:
          enabled: true
          strategy: effective_number
          beta: 0.9999
          oversample_positive: 1.5
        augmentation:
          enabled: true
          probability: 0.5
          steps:
            - name: gaussian_noise
              params:
                sigma_fraction: 0.2
            - name: red_noise
              params:
                amplitude_fraction: 0.03
            - name: baseline_drift
              params:
                max_slope: 0.015
            - name: phase_shift
              params:
                max_shift_bins: 2
            - name: depth_perturbation
              params:
                max_fraction: 0.1
            - name: duration_perturbation
              params:
                max_scale: 0.08
            - name: cadence_mask
              params:
                max_mask_fraction: 0.05
            - name: timing_jitter
              params:
                max_jitter_durations: 0.05
        hard_mining:
          enabled: true
          boost: 2.0
        distillation:
          enabled: false
          temperature: 4.0
          alpha: 0.5
        pretraining:
          enabled: false
          mask_fraction: 0.15
          epochs: 5
        contrastive:
          enabled: false
          temperature: 0.1
          epochs: 5
        calibration:
          enabled: true
          n_bins: 10
        monitoring:
          enabled: true
        checkpoint_averaging:
          ema:
            enabled: true
            decay: 0.999
          swa:
            enabled: true
            start_epoch: 3
        scientific_validation:
          short_period_days: 10.0
          shallow_depth: 0.002
          high_noise_rms: 0.001
  epochs: 20
  batch_size: 16
  learning_rate: 1.0e-3
  early_stopping_patience: 10

evaluation:
  metrics:
    - name: accuracy
      params: {}
    - name: roc_auc
      params: {}
    - name: pr_auc
      params: {}
    - name: calibration_error
      params:
        n_bins: 10
  decision_threshold: 0.5
